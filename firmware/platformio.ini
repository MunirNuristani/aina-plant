; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

; A bare `pio run`/`pio run -e esp32dev` builds only the real firmware
; target. `native` is excluded on purpose: it exists solely to be driven
; via `pio test -e native` (host-machine unit tests), and a plain build of
; it would try to compile src/main.cpp, which needs Arduino.h.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = bblanchon/ArduinoJson@^7

; Runs on the host machine (no ESP32 needed) — for pure-logic modules
; with no Arduino dependency, e.g. MoistureCalibration. SoilMoistureSensor,
; WifiService, ReadingSubmitter, and ReadingRetrier depend on
; Arduino.h/WiFi.h/HTTPClient.h and can't build here. ArduinoJson has no
; Arduino dependency of its own (it explicitly supports plain C++), so
; FirmwareReading's serializer and ReadingSubmitOutcome's response
; classifier (including its retryability rule) build and are unit-tested
; here too.
[env:native]
platform = native
lib_ignore = SoilMoistureSensor, WifiService, ReadingSubmitter, ReadingRetrier
lib_deps = bblanchon/ArduinoJson@^7
