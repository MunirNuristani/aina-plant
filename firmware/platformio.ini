; PlatformIO project configuration
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Runs on the host machine (no ESP32 needed) — for pure-logic modules
; with no Arduino dependency, e.g. MoistureCalibration. SoilMoistureSensor
; depends on Arduino.h (analogRead, Serial, ...) and can't build here.
[env:native]
platform = native
lib_ignore = SoilMoistureSensor
